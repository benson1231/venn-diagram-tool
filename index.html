<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>Venn Diagram Tool</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>
  <div class="container">

    <h1>Venn Diagram Tool</h1>

    <!-- ================= Input Area ================= -->
    <div class="input-grid">

      <div class="card">
        <input class="title" type="text" value="List A" />
        <textarea placeholder="Gene1&#10;Gene2&#10;Gene3"></textarea>
      </div>

      <div class="card">
        <input class="title" type="text" value="List B" />
        <textarea></textarea>
      </div>

      <div class="card">
        <input class="title" type="text" value="List C" />
        <textarea></textarea>
      </div>

    </div>

    <button id="runBtn" type="button">Generate</button>

    <!-- ================= Controls ================= -->
    <div class="controls">

      <label for="fontSelect">Font:</label>
      <select id="fontSelect">
        <option value="'Times New Roman', serif">Times New Roman</option>
        <option value="Arial, sans-serif">Arial</option>
        <option value="Calibri, sans-serif">Calibri</option>
      </select>

      <label for="fontSize">Size:</label>
      <input type="range" id="fontSize" min="12" max="28" value="18">

      <label>
        <input type="checkbox" id="togglePct" checked>
        Show %
      </label>

    </div>

    <!-- ================= Main Layout ================= -->
    <div class="main-layout">

      <!-- Venn Diagram -->
      <div class="venn-wrapper position-relative">

        <div id="venn"></div>

        <!-- Download button -->
        <button 
          id="downloadBtn"
          class="btn btn-dark btn-sm position-absolute top-0 end-0 m-2 shadow-sm"
          data-bs-toggle="tooltip"
          data-bs-placement="left"
          title="Download PNG"
        >
          <i class="bi bi-download"></i>
        </button>

      </div>

      <!-- Result Panel -->
      <div id="resultBox" class="result-box">

        <div class="result-header">
          <div class="result-title">
            Select a region to view genes
          </div>

          <button id="copyBtn" type="button">Copy Selected Genes</button>
        </div>

        <div id="resultSelected" class="result-selected"></div>
        <div id="resultMeta" class="result-meta"></div>
        <div id="resultGenes" class="result-genes"></div>

      </div>

    </div>

  </div>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
